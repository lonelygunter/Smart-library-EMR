Person:
  properties:
    email:
      description: Email address.
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/email'
        uri-prefix: 'https://schema.org/'
    familyName:
      description: >-
        Family name. In the U.S., the last name of an Person. This can be used
        along with givenName instead of the name property.
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/familyName'
        uri-prefix: 'https://schema.org/'
    givenName:
      description: >-
        Given name. In the U.S., the first name of a Person. This can be used
        along with familyName instead of the name property.
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/givenName'
        uri-prefix: 'https://schema.org'
    memberOf:
      description: >-
        An Organization (or ProgramMembership) to which this Person or
        Organization belongs.
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/memberOf'
        uri-prefix: 'https://schema.org/'
  type: object
  x-ngsi:
    uri: 'https://schema.org/Person'
    uri-prefix: 'https://schema.org/'
Book:
  properties:
    isbn:
      description: The ISBN of the book.
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/isbn'
        uri-prefix: 'https://schema.org/'
    name:
      description: The name of the item.
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/name'
        uri-prefix: 'https://schema.org/'
    abstract:
      description: An abstract is a short description that summarizes a CreativeWork.
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/abstract'
        uri-prefix: 'https://schema.org/'
    author:
      description: >-
        The author of this content or rating. Please note that author is special
        in that HTML 5 provides a special mechanism for indicating authorship
        via the rel tag. That is equivalent to this and may be used
        interchangeably.
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/author'
        uri-prefix: 'https://schema.org/'
    genre:
      description: 'Genre of the creative work, broadcast channel or group.'
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/genre'
        uri-prefix: 'https://schema.org/'
    publisher:
      description: The publisher of the creative work.
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/publisher'
        uri-prefix: 'https://schema.org/'
    datePublished:
      description: Date of first broadcast/publication.
      format: date
      type: string
      x-ngsi:
        model: 'https://schema.org/Date'
        type: Property
        uri: 'https://schema.org/datePublished'
        uri-prefix: 'https://schema.org/'
  type: object
  x-ngsi:
    uri: 'https://schema.org/Book'
    uri-prefix: 'https://schema.org/'
Library:
  properties:
    legalName:
      description: 'The official name of the organization, e.g. the registered company name.'
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/legalName'
        uri-prefix: 'https://schema.org/'
    address:
      description: Physical address of the item.
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/address'
        uri-prefix: 'https://schema.org/'
    department:
      description: >-
        A relationship between an organization and a department of that
        organization, also described as an organization (allowing different
        urls, logos, opening hours). For example: a store with a pharmacy, or a
        bakery with a cafe.
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/department'
        uri-prefix: 'https://schema.org/'
    openingHours:
      externalDocs:
        url: 'https://schema.org/openingHours'
      items:
        properties:
          type:
            type: string
          values:
            items:
              type: string
            type: array
        type: object
      type: array
      x-ngsi:
        model: 'https://schema.org/openingHours'
        type: Property
        uri: 'https://schema.org/openingHours'
    hasOfferCatalog:
      description: Physical address of the item.
      type: string
      x-ngsi:
        model: 'https://schema.org/Text'
        type: Property
        uri: 'https://schema.org/hasOfferCatalog'
        uri-prefix: 'https://schema.org/'
  type: object
  x-ngsi:
    uri: 'https://schema.org/Library'
    uri-prefix: 'https://schema.org/'
OfferCatalog:
  properties:
    itemListElement:
      description: >-
        Text values are best if the elements in the list are plain strings.
        Existing entities are best for a simple, unordered list of existing
        things in your data. ListItem is used with ordered lists when you want
        to provide additional context about the element in that list or when the
        same item might be in different places in different lists.
      type: Thing
      x-ngsi:
        model: 'https://schema.org/Thing'
        type: Property
        uri: 'https://schema.org/itemListElement'
        uri-prefix: 'https://schema.org/'
    numberOfItems:
      description: >-
        The number of items in an ItemList. Note that some descriptions might
        not fully describe all items in a list (e.g., multi-page pagination); in
        such cases, the numberOfItems would be for the entire list.
      type: Integer
      x-ngsi:
        model: 'https://schema.org/Integer'
        type: Property
        uri: 'https://schema.org/numberOfItems'
        uri-prefix: 'https://schema.org/'
  type: object
  x-ngsi:
    uri: 'https://schema.org/OfferCatalog'
    uri-prefix: 'https://schema.org/'

